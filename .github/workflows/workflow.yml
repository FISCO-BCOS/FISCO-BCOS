name: macOS-13 CI check
on:
  push:
    paths-ignore:
      - "docs/**"
      - "Changelog.md"
      - "README.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "Changelog.md"
      - "README.md"
  release:
    types: [ push ]
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  compile_macOS_release:
    name: upload standard binary of macOS
    runs-on: macos-13

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 5
      - name: install rust language
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly-2024-01-10
          override: true
      - name: install macOS dependencies
        run: brew install ccache libomp gmp
      - name: check tag v3.7.0
        run: git clone https://github.com/FISCO-BCOS/FISCO-BCOS.git && cd FISCO-BCOS && git checkout v3.7.0
      - name: check git log
        run: cd FISCO-BCOS && git log -1
      - name: configure
        run: cd FISCO-BCOS && export SDKROOT=$(xcrun --sdk macosx --show-sdk-path) && CC=/usr/bin/clang CXX=/usr/bin/clang++ cmake . -DCMAKE_BUILD_TYPE=Release -DBUILD_STATIC=ON
      - name: compile
        run: cd FISCO-BCOS && make -j2 && make tar
      - name: tar BcosBuilder
        run: cd FISCO-BCOS && mv tools/BcosBuilder . && tar -cvzf BcosBuilder.tgz BcosBuilder
      - name: tar fisco-bcos for macOS
        run: cd FISCO-BCOS && mv fisco-bcos-air/ bin/ && mv lightnode/fisco-bcos-lightnode/fisco-bcos-lightnode bin/ && cp tools/BcosAirBuilder/build_chain.sh bin/ && cd bin && strip fisco-bcos && strip fisco-bcos-lightnode && tar -cvzf lightnode.tar.gz fisco-bcos-lightnode && tar -cvzf fisco-bcos.tar.gz fisco-bcos build_chain.sh
      - name: Upload fisco-bcos binaries to release
        uses: svenstaro/upload-release-action@v1-release
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: FISCO-BCOS/bin/fisco-bcos.tar.gz
          asset_name: fisco-bcos-macOS-x86_64.tar.gz
          tag: ${{ github.ref }}
          overwrite: true
      - name: Upload fisco-bcos-lightnode binaries to release
        uses: svenstaro/upload-release-action@v1-release
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: FISCO-BCOS/bin/lightnode.tar.gz
          asset_name: fisco-bcos-lightnode-macOS-x86_64.tar.gz
          tag: ${{ github.ref }}
          overwrite: true
      - name: Upload BcosNodeService binaries to release
        uses: svenstaro/upload-release-action@v1-release
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: FISCO-BCOS/fisco-bcos-tars-service/BcosNodeService.tgz
          asset_name: BcosNodeService-macOS-x86_64.tgz
          tag: ${{ github.ref }}
          overwrite: true
      - name: Upload BcosRpcService binaries to release
        uses: svenstaro/upload-release-action@v1-release
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: FISCO-BCOS/fisco-bcos-tars-service/BcosRpcService.tgz
          asset_name: BcosRpcService-macOS-x86_64.tgz
          tag: ${{ github.ref }}
          overwrite: true
      - name: Upload BcosGatewayService binaries to release
        uses: svenstaro/upload-release-action@v1-release
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: FISCO-BCOS/fisco-bcos-tars-service/BcosGatewayService.tgz
          asset_name: BcosGatewayService-macOS-x86_64.tgz
          tag: ${{ github.ref }}
          overwrite: true
      - name: Upload BcosMaxNodeService binaries to release
        uses: svenstaro/upload-release-action@v1-release
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: FISCO-BCOS/fisco-bcos-tars-service/BcosMaxNodeService.tgz
          asset_name: BcosMaxNodeService-macOS-x86_64.tgz
          tag: ${{ github.ref }}
          overwrite: true
      - name: Upload BcosExecutorService binaries to release
        uses: svenstaro/upload-release-action@v1-release
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: FISCO-BCOS/fisco-bcos-tars-service/BcosExecutorService.tgz
          asset_name: BcosExecutorService-macOS-x86_64.tgz
          tag: ${{ github.ref }}
          overwrite: true
      - name: Upload build_chain.sh
        uses: svenstaro/upload-release-action@v1-release
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: FISCO-BCOS/tools/BcosAirBuilder/build_chain.sh
          asset_name: build_chain.sh
          tag: ${{ github.ref }}
          overwrite: true
      - name: Upload BcosBuilder
        uses: svenstaro/upload-release-action@v1-release
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: FISCO-BCOS/BcosBuilder.tgz
          asset_name: BcosBuilder.tgz
          tag: ${{ github.ref }}
          overwrite: true
